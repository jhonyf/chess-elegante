# Local Development - PostgreSQL only
# Use this for local development. The Flask app runs on your host machine.
# In production (AWS ECS), you'll use RDS PostgreSQL instead.

version: '3.8'

services:
  # PostgreSQL Database (local development only)
  postgres:
    image: postgres:15-alpine
    container_name: chess_elegante_db
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
      POSTGRES_DB: chess_elegante
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chess_elegante"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
